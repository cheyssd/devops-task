name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["18.x", "20.x"]   # Test sur 2 versions Node

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'                    # Cache automatique des node_modules

      - name: Installation des dépendances
        run: npm ci                       # npm ci est plus strict que npm install

      - name: Lint du code
        run: npm run lint || true

      - name: Exécution des tests avec couverture
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/

  code-quality:
    name: Qualité du code
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: 'npm'

      - run: npm ci

      - name: Vérification des vulnérabilités
        run: npm audit --audit-level=high || true

      - name: Vérification des dépendances obsolètes
        run: npm outdated || true